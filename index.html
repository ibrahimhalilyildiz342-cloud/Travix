<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travix - AI Seyahat Planlayıcı</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet Harita Kütüphanesi CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Özel Tasarımımız -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header & Search Area -->
        <header class="search-section">
            <h1 class="logo">Travix.<span>ai</span></h1>
            <p class="subtitle">Yapay zeka ile saniyeler içinde mükemmel rotanızı oluşturun.</p>
            
            <div class="search-box">
                <input type="text" id="destination-input" placeholder="Örn: Bangkok, Paris veya Kapadokya..." autocomplete="off">
                <button id="plan-btn">
                    <span class="btn-text">Rotayı Planla</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </header>

        <!-- Yükleniyor Göstergesi -->
        <div id="loader-overlay" class="hidden">
            <div class="loader-content">
                <div class="spinner"></div>
                <p>Yapay Zeka rotanızı tasarlıyor...</p>
            </div>
        </div>

        <!-- Ana İçerik: Harita ve Plan -->
        <main id="result-section" class="hidden">
            <!-- Sol Taraf: Harita -->
            <div class="map-container">
                <div id="map"></div>
                <div class="map-overlay-title" id="map-title">
                    <!-- Dinamik başlık gelecek -->
                </div>
            </div>

            <!-- Sağ Taraf: Yolculuk Planı (Zaman Çizelgesi) -->
            <div class="timeline-container glass-panel">
                <div class="timeline-header">
                    <h2 id="plan-title">Plana Genel Bakış</h2>
                    <p id="plan-desc">Özetiniz hazırlanıyor...</p>
                </div>
                
                <div class="timeline" id="timeline-content">
                    <!-- Dinamik olarak JS tarafından doldurulacak -->
                </div>
            </div>
        </main>
    </div>

    <!-- Leaflet Harita Kütüphanesi JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Uygulama Mantığı -->
    <script src="js/app.js"></script>
</body>
</html>
